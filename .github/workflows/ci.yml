name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NVibrance.slnx

      - name: Build
        run: dotnet build NVibrance.slnx -c Release --no-restore

      - name: Test
        run: dotnet test NVibrance.slnx -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: TestResults
